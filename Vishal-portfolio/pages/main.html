<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../styles/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
</head>
<body>
      <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top top-0">
        <div class="container">
          <a href="#" class="navbar-brand fs-4 fw-bold"><i class="bi bi-check-circle-fill  icon pe-1"></i>TaskMaster</a>
 <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
 </button>
   <div class="navbar-collapse collapse " id="navbarNav">
     <ul class="navbar-nav ms-auto "> 
       <li class="nav-item pe-3 pt-3 pt-lg-0 ">
        <input type="text" name="search" id="search" placeholder="Search" class="p-2 rounded-3  ">
       </li>
       <li class="nav-item pe-3 pt-3 pt-lg-0">
        <a href="" class="nav-link " id="theme"><i class="bi bi-moon-fill fs-4 "></i></a>
       </li>
       <li class="nav-item pt-3 pt-lg-0">
        <button class="btn fw-bold violet-button rounded-pill" id="user"><i class="bi bi-person-fill fs-4  "></i> User</button>
       </li>
       <li class="nav-item pt-3 pt-lg-0">
        <button class="btn fw-bold violet-button rounded-pill ms-lg-3" id="user"><i class="bi bi-door-open fs-4  "></i> Logout</button>
       </li>
     </ul>
   </div>
    
   </div>
       

    </nav>
    <section class="container mt-5">
  <div class="row g-3">
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Total Tasks</p>
                                 <p class="fw-bold fs-1">3</p>
                           </div>
                            <div>
                                  <i class="bi bi-check-circle fs-3  px-3 py-2 rounded-4 " style="background-color: rgba(124, 104, 238, 0.232); color: rgb(100, 63, 160);"></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar" style="width: 100%;background-color: rgb(124, 104, 238);"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Completed</p>
                                 <p class="fw-bold fs-1">1</p>
                           </div>
                            <div>
                                  <i class="bi bi-check fs-3  px-3 py-2 rounded-4 text-success bg-success-subtle " "></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar bg-success" style="width: 33%;"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    <div class="col-lg-4 ">
           <div class="card rounded-4">
                      <div class="card-body ">
                        <div class="d-flex justify-content-between align-items-center ">
                             <div>
                                 <p class="textt-muted fs-6 mb-1">Pending</p>
                                 <p class="fw-bold fs-1">2</p>
                           </div>
                            <div>
                                  <i class="bi bi-clock fs-3  px-3 py-2 rounded-4 text-warning bg-warning-subtle " "></i>  
                           </div>
                        </div>
                          <div class="progress" style="height: 8px;">
                               <div class="progress-bar bg-warning" style="width: 67%;"></div>
                          </div>
                          
                      </div>
           </div>
    </div>
    
    
  </div>
    </section>
</body>
</html>
